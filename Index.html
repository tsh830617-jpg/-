<!DOCTYPE html>
<html lang="zh-TW">

<title>懷孕完全指南</title>
<style>
:root{--bg:#F5F0EB;--card:#fff;--linen:#EDE5D8;--tan:#C4A882;--brown:#7A5C3A;--dk:#3D2B1F;--sage:#7A8C6E;--sageL:#D6E0CF;--terra:#B5714F;--terraL:#F0DDD4;--gold:#A67C52;--goldL:#F2E8D8;--blue:#6B8FA8;--blueL:#DDE8F0;--soft:#7A5C3A;--border:#D4C4B0}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:Georgia,serif;background:var(--bg);color:var(--dk);min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
button{font-family:Georgia,serif;cursor:pointer;border:none;background:none}
input{font-family:Georgia,serif}
#hdr{background:var(--dk);padding:20px 20px 14px;text-align:center}
#hdr h1{color:#fff;font-size:20px;font-weight:bold;margin:8px 0 0}
#hdr p{color:var(--tan);font-size:11px;margin:5px 0 0}
#conn-area{margin-top:10px;display:flex;flex-direction:column;align-items:center;gap:6px}
#conn-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px}
#cdot{width:7px;height:7px;border-radius:50%;background:#A67C52;display:inline-block;flex-shrink:0}
#clbl{font-size:10px;color:rgba(255,255,255,.85)}
#rbtn{font-size:10px;color:var(--tan);background:rgba(255,255,255,.15);border-radius:12px;padding:3px 10px;display:none;margin-left:2px}
#prog-wrap{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:20px;padding:5px 14px}
#prog-wrap .pl{font-size:11px;color:var(--tan)}
#pbg{width:80px;height:5px;background:rgba(255,255,255,.2);border-radius:3px;overflow:hidden}
#pf{height:100%;border-radius:3px;background:var(--tan);width:0%;transition:width .35s}
#pc{font-size:11px;color:#fff;font-weight:bold}
#tabs{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.tb{flex:1;padding:11px 2px;font-size:11px;color:var(--soft);border-bottom:2px solid transparent;transition:all .2s}
.tb.on{color:var(--dk);font-weight:600;border-bottom-color:var(--brown)}
#main{max-width:680px;margin:0 auto;padding-bottom:60px}
.tp{display:none}.tp.on{display:block}
#pills{display:flex;gap:8px;padding:14px 14px 0;overflow-x:auto;scrollbar-width:none}
#pills::-webkit-scrollbar{display:none}
.pl-btn{flex-shrink:0;border:1.5px solid var(--border);border-radius:10px;background:#fff;color:var(--soft);font-size:10px;font-weight:600;padding:8px 10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .2s}
.pl-btn .ic{display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.pl-btn .wk{opacity:.7;font-size:9px}
.pdots{display:flex;gap:2px;margin-top:2px}
.pdots i{display:inline-block;width:4px;height:4px;border-radius:50%}
.card{border-radius:16px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.06);border:1px solid var(--border);margin:12px 14px}
.sh{padding:14px 20px;color:#fff}
.sh-row{display:flex;justify-content:space-between;align-items:center}
.sh h2{font-size:17px;font-weight:bold}
.sh .sub{opacity:.8;font-size:12px;margin-top:1px}
.pmini{min-width:100px}
.pml{font-size:10px;opacity:.8;text-align:right;margin-bottom:4px}
.pr{display:flex;align-items:center;gap:8px}
.pt{flex:1;height:5px;border-radius:3px;overflow:hidden}
.pfi{height:100%;border-radius:3px;transition:width .35s}
.pco{font-size:11px;min-width:36px}
.sec{background:var(--card)}
.sec-t{padding:9px 18px 2px;font-size:10px;font-weight:bold;color:var(--brown);letter-spacing:.8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.sec-b{padding:2px 18px 12px}
.dvd{height:1px;background:var(--border)}
.ci{display:flex;gap:7px;align-items:flex-start;padding:8px 0}
.ci:not(:last-child){border-bottom:1px solid var(--border)}
.ci strong{font-size:13px;display:block}
.ci small{font-size:11px;color:var(--soft);margin-top:2px;display:block}
.si{padding:8px 0}.si:not(:last-child){border-bottom:1px solid var(--border)}
.sn{font-weight:bold;font-size:13px;color:var(--terra)}
.sk{font-size:11px;color:var(--soft);margin-top:2px}
.ki{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0}
.ki:not(:last-child){border-bottom:1px solid var(--tan)}
.kl{flex:1;font-size:12px}
.chip{font-size:9px;padding:1px 7px;border-radius:20px;margin-left:5px;font-weight:bold}
.ka{font-size:12px;font-weight:bold;flex-shrink:0;margin-left:8px}
.tr{display:flex;gap:10px;padding:10px 18px;cursor:pointer;align-items:flex-start;transition:background .2s;user-select:none}
.tr:not(:last-child){border-bottom:1px solid var(--tan)}
.cb-box{width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;transition:all .18s;pointer-events:none}
.tt{font-size:12px;line-height:1.6;flex:1;transition:all .2s}
.tt.done{text-decoration:line-through;color:var(--soft)}
.dl{font-size:10px;font-weight:bold;flex-shrink:0;margin-top:2px}
.tr-edit{display:flex;gap:8px;padding:9px 18px;align-items:center}
.tr-edit:not(:last-child){border-bottom:1px solid var(--tan)}
.t-input{flex:1;font-size:12px;border:1px solid var(--tan);border-radius:8px;padding:5px 9px;color:var(--dk);background:#fff;outline:none}
.del-btn{width:28px;height:28px;border-radius:50%;background:var(--terraL);color:var(--terra);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.add-row{display:flex;gap:8px;padding:10px 18px;border-top:1px dashed var(--tan)}
.add-inp{flex:1;font-size:12px;border:1px solid var(--tan);border-radius:8px;padding:6px 10px;color:var(--dk);background:#fff;outline:none}
.add-btn{background:var(--brown);color:#fff;border-radius:8px;padding:6px 14px;font-size:12px;flex-shrink:0}
.edit-toggle{font-size:11px;color:var(--brown);background:var(--linen);border:1px solid var(--tan);border-radius:12px;padding:3px 10px}
.edit-toggle.on{background:var(--brown);color:#fff;border-color:var(--brown)}
.note-bar{padding:12px 18px;border-top:1px solid var(--tan);font-size:12px;color:var(--soft);line-height:1.7}
#cl-wrap{padding:14px}
.sum{border-radius:14px;background:var(--dk);padding:18px 20px;margin-bottom:14px;color:#fff}
.sum-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sum-num{font-size:26px;font-weight:bold}
.sum-of{font-size:10px;color:var(--tan)}
.big-pg{height:8px;background:rgba(255,255,255,.15);border-radius:4px;overflow:hidden}
.big-pf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--tan),var(--sage));transition:width .4s}
.sum-ft{margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.sg{border-radius:14px;overflow:hidden;margin-bottom:12px;border:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.05)}
.gh{padding:12px 16px}
.gh-row{display:flex;justify-content:space-between;align-items:center}
.g-info{display:flex;align-items:center;gap:8px}
.g-ic{display:flex;align-items:center;flex-shrink:0}
.g-nm{font-size:14px;font-weight:bold}
.g-db{font-size:11px;margin-left:6px;color:var(--sage)}
.g-wk{font-size:10px;margin-top:1px}
.gt{background:#fff}
.clt{display:flex;gap:12px;padding:12px 16px;cursor:pointer;align-items:flex-start;transition:background .2s;user-select:none}
.clt:not(:last-child){border-bottom:1px solid var(--border)}
.clt .tt{font-size:13px}
.clear-btn{display:block;margin:8px auto 0;border:1px solid var(--border);border-radius:8px;padding:8px 18px;font-size:12px;color:var(--soft)}
#ct-wrap{padding:14px}
#ct-wrap h2{font-size:15px;text-align:center;margin:14px 0 4px;color:var(--dk)}
.cc{border-radius:16px;overflow:hidden;margin-bottom:20px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.ch{padding:16px 20px;color:#fff}
.cn{font-size:17px;font-weight:bold;margin-bottom:3px}
.cs{font-size:12px;opacity:.85;margin-left:6px}
.ca{font-size:11px;opacity:.85;margin-bottom:6px}
.ctag{background:rgba(255,255,255,.2);color:#fff;font-size:10px;padding:2px 10px;border-radius:20px;display:inline-block;margin-right:4px}
.ce{padding:10px 18px;border-bottom:1px solid var(--border)}
.rm{display:flex;justify-content:space-between;padding:7px 0}
.rm:not(:last-child){border-bottom:1px solid var(--border)}
.sbox{border-radius:8px;padding:9px 12px;font-size:12px;font-weight:bold;margin:12px 18px}
.vs{border-radius:14px;background:#fff;padding:18px;border:1px solid var(--border)}
.vs h3{font-size:14px;text-align:center;margin:0 0 12px;color:var(--dk)}
.vs-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vs-c{border-radius:10px;padding:12px}
#co-wrap{padding:14px}
#co-wrap h2{font-size:16px;text-align:center;margin:14px 0 0;color:var(--dk)}
.tot{border-radius:14px;background:var(--dk);padding:20px 18px;text-align:center;margin:14px 0;color:#fff}
.cl{border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.cr{padding:13px 18px}.cr:not(:last-child){border-bottom:1px solid var(--border)}
.cr-in{display:flex;justify-content:space-between;align-items:flex-start}
.cr-bar{margin-top:7px;height:3px;background:var(--linen);border-radius:2px;overflow:hidden}
.cr-bf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--terra),var(--gold))}
.tot-row{padding:15px 18px;background:var(--terraL);display:flex;justify-content:space-between;align-items:center}
.fin{margin-top:12px;border-radius:12px;background:var(--linen);padding:14px 16px;border:1px solid var(--tan)}
.fin h4{font-size:13px;font-weight:bold;color:var(--dk);margin-bottom:8px}
.ft{display:flex;gap:8px;margin-bottom:6px;font-size:12px;line-height:1.6}
</style>
</head>

var S = { tab:"stages", si:0, checked:{}, custom:{}, editId:null, timer:null };

function getTasks(sid) {
  if (S.custom[sid] && S.custom[sid].length > 0) { return S.custom[sid]; }
  var st = STAGES.filter(function(x){ return x.id===sid; })[0];
  if (!st) { return []; }
  return st.defTasks.map(function(t,i){ return {id:"s"+sid+"t"+i, text:t}; });
}

function getStage(id) {
  return STAGES.filter(function(x){ return x.id===id; })[0];
}

function countAll() {
  var d=0, t=0;
  STAGES.forEach(function(st){
    getTasks(st.id).forEach(function(task){ t++; if(S.checked[task.id]){d++;} });
  });
  return {d:d,t:t};
}

function newId() { return "u"+Date.now().toString(36)+Math.floor(Math.random()*1000).toString(36); }

function fbPoll() {
  fetch(FB+"/.json")
    .then(function(r){if(!r.ok){throw new Error(r.status);} return r.json();})
    .then(function(data){
      S.checked=(data&&data.checklist)?data.checklist:{};
      S.custom=(data&&data.custom)?data.custom:{};
      setConn("connected"); renderAll();
    })
    .catch(function(){ setConn("error"); });
}

function fbSetChecked(id,val) {
  fetch(FB+"/checklist/"+id+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:val?"true":"null"}).catch(function(){});
}

function fbSetTasks(sid) {
  var tasks=S.custom[sid]||null;
  fetch(FB+"/custom/"+sid+".json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(tasks)}).catch(function(){});
}

function fbClearAll() {
  fetch(FB+"/checklist.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:"null"}).catch(function(){});
  fetch(FB+"/custom.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:"null"}).catch(function(){});
}

function reconnect() { clearInterval(S.timer); setConn("connecting"); fbPoll(); S.timer=setInterval(fbPoll,4000); }

function setConn(s) {
  var dot=document.getElementById("cdot");
  var lbl=document.getElementById("clbl");
  var btn=document.getElementById("rbtn");
  if(!dot){return;}
  if(s==="connected"){dot.style.cssText="width:7px;height:7px;border-radius:50%;background:#7A8C6E;display:inline-block;flex-shrink:0";lbl.textContent="即時同步中";btn.style.display="none";}
  else if(s==="error"){dot.style.cssText="width:7px;height:7px;border-radius:50%;background:#B5714F;display:inline-block;flex-shrink:0";lbl.textContent="連線失敗";btn.style.display="inline-block";}
  else{dot.style.cssText="width:7px;height:7px;border-radius:50%;background:#A67C52;display:inline-block;flex-shrink:0";lbl.textContent="連線中...";btn.style.display="none";}
}

function toggle(id){ S.checked[id]=!S.checked[id]; fbSetChecked(id,S.checked[id]); renderAll(); }

function startEdit(sid){ S.editId=(S.editId===sid)?null:sid; renderAll(); }

function delTask(sid,tid){
  var tasks=getTasks(sid).filter(function(t){return t.id!==tid;});
  S.custom[sid]=tasks; delete S.checked[tid];
  fbSetTasks(sid); fbSetChecked(tid,false); renderAll();
}

function saveTaskText(sid,tid){
  var inp=document.getElementById("inp-"+tid); if(!inp){return;}
  var val=inp.value.trim(); if(!val){return;}
  var tasks=getTasks(sid).map(function(t){return t.id===tid?{id:tid,text:val}:t;});
  S.custom[sid]=tasks; fbSetTasks(sid);
}

function addTask(sid){
  var inp=document.getElementById("add-inp-"+sid); if(!inp){return;}
  var val=inp.value.trim(); if(!val){return;}
  var tasks=getTasks(sid).slice();
  tasks.push({id:newId(),text:val});
  S.custom[sid]=tasks; fbSetTasks(sid);
  inp.value=""; renderAll();
}

function clearAll(){ if(!confirm("確定要清除所有勾選記錄與自訂事項嗎？")){return;} S.checked={}; S.custom={}; S.editId=null; fbClearAll(); renderAll(); }

function goTab(t){
  S.tab=t;
  document.querySelectorAll(".tb").forEach(function(b,i){b.classList.toggle("on",["stages","checklist","centers","costs"][i]===t);});
  document.querySelectorAll(".tp").forEach(function(p,i){p.classList.toggle("on",["stages","checklist","centers","costs"][i]===t);});
  renderAll();
}

function selStage(i){ S.si=i; S.editId=null; renderAll(); }

function chip(type){
  var m={gov:["#7A8C6E","健保給付"],must:["#B5714F","必要自費"],opt:["#A67C52","自費選配"]};
  var p=m[type]||m.opt;
  return '<span class="chip" style="background:'+p[0]+'22;color:'+p[0]+'">'+p[1]+'</span>';
}

function cbViz(taskId,accent){
  var done=!!S.checked[taskId];
  var bg=done?accent:"#fff";
  var bc=done?accent:"#D4C4B0";
  var ck=done?'<svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4L4.5 7.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':"";
  return '<div class="cb-box" style="background:'+bg+';border-color:'+bc+'">'+ck+'</div>';
}

function prBar(done,total,color,dark){
  var pct=total?Math.round(done/total*100):0;
  var tr=dark?"rgba(255,255,255,.2)":"#EDE5D8";
  var tc=dark?"rgba(255,255,255,.9)":(done===total&&total>0?color:"#7A5C3A");
  var fw=(done===total&&total>0)?"bold":"normal";
  return '<div class="pr"><div class="pt" style="background:'+tr+'"><div class="pfi" style="width:'+pct+'%;background:'+color+'"></div></div><span class="pco" style="color:'+tc+';font-weight:'+fw+'">'+done+'/'+total+'</span></div>';
}

function renderProg(){
  var r=countAll();
  var pct=r.t?(r.d/r.t*100):0;
  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pc").textContent=r.d+"/"+r.t;
}

  var shots=st.shots.map(function(s){return '<div class="si"><div class="sn">'+s.name+'</div><div class="sk">'+s.note+'</div></div>';}).join("");
  var costs=st.costs.map(function(c){var ac=c.type==="gov"?"#7A8C6E":c.type==="must"?"#B5714F":"#A67C52";return '<div class="ki"><div class="kl">'+c.label+chip(c.type)+'</div><div class="ka" style="color:'+ac+'">'+c.amount+'</div></div>';}).join("");

  var eLabel=inEdit?"完成 ✓":"&#9998; 編輯";

  var taskHTML;

    taskHTML=tasks.map(function(t){

  } else {
    taskHTML=tasks.map(function(t){
      var done=!!S.checked[t.id];
      var bg=done?st.accentL+"66":"transparent"; var td=done?"line-through":"none"; var tc=done?"#7A5C3A":"#3D2B1F";

    }).join("");
  }

  panel.innerHTML=pills+'<div class="card"><div class="sh" style="background:'+st.accent+'"><div class="sh-row"><div><h2>'+st.period+'</h2><div class="sub">'+st.weeks+'</div></div><div class="pmini"><div class="pml">先生待辦</div>'+prBar(stageDone,tasks.length,"rgba(255,255,255,.9)",true)+'</div></div></div><div class="sec" style="background:'+st.accentL+'"><div class="sec-t">必要檢查項目</div><div class="sec-b">'+checks+'</div></div><div class="dvd"></div><div class="sec"><div class="sec-t">疫苗 / 注射</div><div class="sec-b">'+shots+'</div></div><div class="dvd"></div><div class="sec" style="background:#F2E8D8"><div class="sec-t">費用項目</div><div class="sec-b">'+costs+'</div></div><div class="dvd"></div><div class="sec" style="background:#EDE5D8"><div class="sec-t">先生待辦事項 <button class="'+eClass+'" onclick="startEdit(''+st.id+'')">'+eLabel+'</button></div>'+taskHTML+'</div><div class="note-bar">&#128161; '+st.note+'</div></div>';

  var dotColor=document.getElementById("cdot").style.background||"#A67C52";

  var miniConn='<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.12);border-radius:20px;padding:4px 12px"><span style="width:7px;height:7px;border-radius:50%;background:'+dotColor+';display:inline-block"></span><span style="font-size:10px;color:rgba(255,255,255,.85)">'+dotLbl+'</span></div>';
  var clearBt=r.d>0?'<button class="clear-btn" onclick="clearAll()">清除所有記錄</button>':"";

  panel.innerHTML='<div id="cl-wrap"><div class="sum"><div class="sum-top"><div><div style="font-size:15px;font-weight:bold">先生待辦清單</div><div style="font-size:11px;color:var(--tan);margin-top:2px">兩人即時同步 &#183; Firebase 儲存</div></div><div><div class="sum-num" style="color:'+nc+'">'+r.d+'</div><div class="sum-of">/ '+r.t+' 完成</div></div></div><div class="big-pg"><div class="big-pf" style="width:'+pct+'%"></div></div><div class="sum-ft">'+miniConn+adm+'</div></div>'+groups+clearBt+'</div>';

function renderCosts(){
  var panel=document.getElementById("tp-costs"); if(!panel||!panel.classList.contains("on")){return;}
  var maxH=0; COSTS_DATA.forEach(function(c){if(c.hi>maxH){maxH=c.hi;}});
  var tMin=COSTS_DATA.reduce(function(s,c){return s+c.lo;},0);
  var tMax=COSTS_DATA.reduce(function(s,c){return s+c.hi;},0);
  var rows=COSTS_DATA.map(function(c,i){
    var pct=Math.round(c.hi/maxH*100); var bg=i%2===0?"#fff":"#F5F0EB";
    return '<div class="cr" style="background:'+bg+'"><div class="cr-in"><div><div style="font-size:13px;font-weight:bold;margin-bottom:2px">'+c.cat+'</div><div style="font-size:11px;color:var(--soft)">'+c.note+'</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:11px;color:var(--terra)">$'+c.lo.toLocaleString()+'-</div><div style="font-size:12px;font-weight:bold;color:var(--terra)">$'+c.hi.toLocaleString()+'</div></div></div><div class="cr-bar"><div class="cr-bf" style="width:'+pct+'%"></div></div></div>';
  }).join("");
  panel.innerHTML='<div id="co-wrap"><h2>費用總覽</h2><div class="tot"><div style="font-size:12px;color:var(--tan);margin-bottom:5px">懷孕到月子期 &#183; 總費用預估範圍</div><div style="font-size:24px;font-weight:bold">$'+tMin.toLocaleString()+' - $'+tMax.toLocaleString()+'</div><div style="font-size:11px;color:var(--tan);margin-top:4px">不含日常孕期日用品與育嬰備品長期開銷</div></div><div class="cl">'+rows+'<div class="tot-row"><span style="font-weight:bold;font-size:14px">合計（參考範圍）</span><span style="font-size:15px;font-weight:bold;color:var(--terra)">$'+tMin.toLocaleString()+' - $'+tMax.toLocaleString()+'</span></div></div><div class="fin"><h4>先生財務分擔建議</h4>'+["從備孕期開始每月存入「寶寶基金」$10,000 以上","主動查詢勞保/健保生育補助，最高可補助約 $42,000","善用公司陪產假/育嬰假，了解政府補貼資源","月子中心費用不是媽媽一人的事，主動承擔是責任","產後報稅：自然產所有醫療單據均可申報"].map(function(t){return '<div class="ft"><span style="color:var(--terra);font-weight:bold;flex-shrink:0">&#10003;</span><span>'+t+'</span></div>';}).join("")+'</div></div>';
